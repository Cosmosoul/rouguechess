          <button class="btn" onclick="showMenu()">返回菜单</button>
        </div>
      </div>
    </div>
  `;
}

function showMenu() {
  gameState.phase = 'menu';
  gameState.isTutorial = false;
  gameState.shopItems = { lottery: 0, super_lottery: 0, death_immunity: 0, invincible: 0 };
  gameState.deathImmunityUsed = false;
  clearShopItems();
  loadStats();
  render();
}

function renderGame() {
  const board = gameState.boards[gameState.currentBoardIndex];
  const size = board.size;
  const { row: pr, col: pc } = gameState.player;
  let slideClass = 'slide-reset';
  if (gameState.slideDirection) {
    if (gameState.slideDirection.startsWith('out-')) {
      slideClass = 'slide-out-' + gameState.slideDirection.replace('out-', '');
    } else if (gameState.slideDirection.startsWith('in-')) {
      slideClass = 'slide-in-' + gameState.slideDirection.replace('in-', '');
    }
  }

  let cellsHTML = '';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const isLight = (r + c) % 2 === 0;
      const isPortal = board.portalCells.some(p => p.row === r && p.col === c);
      const isReachable = gameState.reachableCells.some(rc => rc.row === r && rc.col === c);
      const isPlayer = (r === pr && c === pc);
      const enemy = getEnemyAt(board, r, c);
      let hasItem = false;
      let itemType = null;
      if (board.item && !board.item.collected && board.item.row === r && board.item.col === c) {
        hasItem = true;
        itemType = board.item.type;
      }
      if (board.items) {
        for (const it of board.items) {
          if (!it.collected && it.row === r && it.col === c) {
            hasItem = true;
            itemType = it.type;
            break;
          }
        }
      }

      let cellClass = isLight ? 'light' : 'dark';
      if (isPortal) cellClass += ' portal' + (isLight ? ' light-override' : '');
      if (isReachable && !isPlayer) cellClass += ' reachable';
      if (isPlayer) cellClass += ' player-pos';
      if (isPlayer && gameState.captureAnimating) cellClass += ' cell-captured';

      let content = '';
      let animStyle = '';
      let animClass = '';
      const ap = gameState.animatingPiece;

      if (isPlayer) {
        if (gameState.captureAnimating) {
          const capEnemy = board.enemies.find(e => e.alive !== false && e.row === pr && e.col === pc);
          if (capEnemy) {
            const sym = PIECE_SYMBOLS[`black_${capEnemy.type}`] || '?';
            content = `<span class="piece capture-piece">${sym}</span>`;
          } else {
            content = `<span class="piece">${PIECE_SYMBOLS.white_pawn}</span>`;
          }
        } else {
          if (ap && ap.color === 'white') {
            animClass = ' piece-slide';
            animStyle = `--sx:${(ap.fromCol - ap.toCol) * 100}%;--sy:${(ap.fromRow - ap.toRow) * 100}%`;
          }
          content = `<span class="piece${animClass}" style="${animStyle}">${PIECE_SYMBOLS.white_pawn}</span>`;
        }
      } else if (enemy) {
        const sym = PIECE_SYMBOLS[`black_${enemy.type}`] || '?';
        if (ap && ap.color === 'black' && ap.toRow === r && ap.toCol === c) {
          animClass = ' piece-slide';
          animStyle = `--sx:${(ap.fromCol - ap.toCol) * 100}%;--sy:${(ap.fromRow - ap.toRow) * 100}%`;
        }
        content = `<span class="piece${animClass}" style="${animStyle}">${sym}</span>`;
      }

      let itemDot = '';
      if (hasItem && itemType) {
        const colorMap = {
          yellow: 'hsl(50, 80%, 55%)', blue: 'hsl(210, 70%, 55%)', green: 'hsl(140, 60%, 48%)',
          orange: 'hsl(25, 80%, 55%)', purple: 'hsl(280, 60%, 55%)'
        };
        const clr = colorMap[itemType] || 'hsl(50, 80%, 55%)';
        itemDot = `<span class="item-indicator" style="background:${clr}; color:${clr};"></span>`;
      }

      cellsHTML += `
        <div class="cell ${cellClass}" data-row="${r}" data-col="${c}">
          ${content}${itemDot}
        </div>`;
    }
  }

  const boardType = board.type;
  let boardLabel = BOARD_LABELS[boardType] || boardType;
  if (gameState.isTutorial) {
    boardLabel = TUTORIAL_LEVELS[gameState.tutorialLevel]?.name || '教学关卡';
  }

  const turnLabel = gameState.turn === 'player' ? '你的回合' : '敌方回合';
  const turnColor = gameState.turn === 'player' ? 'var(--color-accent)' : 'var(--color-danger)';

  const abilityProgress = gameState.abilityCount % 3;
  const nextAbility = 3 - abilityProgress;
  const scoreDisplay = `得分: ${gameState.score}`;
  const gridStyle = `grid-template-columns: repeat(${size}, 1fr); grid-template-rows: repeat(${size}, 1fr);`;

  const roomInfo = gameState.isTutorial
    ? `教学关卡 ${gameState.tutorialLevel + 1}/6`
    : `房间 ${gameState.currentBoardIndex + 1}/${gameState.boards.length}`;

  const hasDeathImmunity = !gameState.isTutorial && gameState.shopItems.death_immunity > 0 && !gameState.deathImmunityUsed;
  const canReturn = !gameState.isTutorial && gameState.previousBoardIndex !== null && gameState.boards[gameState.currentBoardIndex]?.portalCells.some(p => p.row === pr && p.col === pc && p.targetBoard === gameState.previousBoardIndex);

  return `
    <div>
      <div class="hud flex items-center justify-between mb-2 px-1" style="gap: 8px;">
        <div class="min-w-0 flex-1">
          <div style="color: var(--color-accent);">${boardLabel}</div>
          <div style="font-size: 7px; color: var(--color-text-muted);">${roomInfo}</div>
        </div>
        <div class="text-center min-w-0">
          <div style="color: ${turnColor};">${turnLabel}</div>
          <div style="font-size: 7px; color: var(--color-text-muted);">回合 ${gameState.turnNumber}</div>
        </div>
        <div class="text-right min-w-0">
          <div style="color: var(--color-accent); font-size: 9px;">${scoreDisplay}</div>
          <div style="font-size: 7px; color: var(--color-text-muted);">最高 ${gameState.highScore}</div>
          ${hasDeathImmunity ? '<div style="font-size:7px;color:hsl(0,70%,48%);">🛡 免死金牌</div>' : ''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:7px;color:var(--color-text-muted);">
        <span>能力进度</span>
        <div style="flex:1;height:4px;background:var(--color-surface-alt);border-radius:2px;overflow:hidden;">
          <div style="width:${(gameState.abilityCount % 3) / 3 * 100}%;height:100%;background:var(--color-accent);border-radius:2px;transition:width 0.3s;"></div>
        </div>
        <span>${nextAbility === 3 ? '0' : nextAbility}/3</span>
      </div>
      ${canReturn ? '<div style="font-size:7px;color:var(--color-accent);text-align:center;margin-bottom:4px;">🔙 点击脚下可返回上一房间</div>' : ''}

      <div class="board-wrapper">
        <div class="board-grid board-slide ${slideClass}" id="board-grid" style="${gridStyle}">
          ${cellsHTML}
        </div>
      </div>

      <div class="mt-3 flex items-center justify-between" style="gap: 8px;">
        <button class="btn small" id="btn-map" ${gameState.isTutorial ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>地图${gameState.isTutorial ? '🚫' : ''}</button>
        <button class="btn small" id="btn-abilities">能力</button>
        <button class="btn small" id="btn-menu">菜单</button>
      </div>

      <div style="font-size: 7px; color: var(--color-text-muted); text-align: center; margin-top: 12px; line-height: 2;">
        点击格子移动 | Tab地图 Ctrl能力 Esc菜单${gameState.isTutorial ? ' | 教学模式地图不可用' : ''}
      </div>
      ${gameState.captureAnimating ? '<div class="capture-overlay"></div>' : ''}
    </div>
  `;
}

// ============================================================
// OVERLAYS
// ============================================================

let mapVisible = false;
let abilitiesVisible = false;
let pauseVisible = false;

function toggleMap() {
  if (gameState.phase !== 'playing' && gameState.phase !== 'tutorial_playing') return;
  if (gameState.isTutorial) {
    showToast('教学模式中地图不可用', 'hsl(75,20%,50%)');
    return;
  }
  mapVisible = !mapVisible;
  abilitiesVisible = false;
  pauseVisible = false;
  renderOverlays();
}

function toggleAbilities() {
  if (gameState.phase !== 'playing' && gameState.phase !== 'tutorial_playing') return;
  abilitiesVisible = !abilitiesVisible;
  mapVisible = false;
  pauseVisible = false;
  renderOverlays();
}

function togglePause() {
  if (gameState.phase !== 'playing' && gameState.phase !== 'tutorial_playing' && gameState.phase !== 'paused') return;
  if (gameState.phase === 'paused') {
    gameState.phase = gameState.isTutorial ? 'tutorial_playing' : 'playing';
    pauseVisible = false;
    document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
    render();
    return;
  }
  gameState.phase = 'paused';
  pauseVisible = true;
  mapVisible = false;
  abilitiesVisible = false;
  document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
  renderPauseOverlay();
}

function renderOverlays() {
  document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
  if (mapVisible) renderMapOverlay();
  if (abilitiesVisible) renderAbilitiesOverlay();
  if (pauseVisible) renderPauseOverlay();
}

function renderMapOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'map-overlay dynamic-overlay';
  overlay.innerHTML = `
    <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--color-accent);z-index:1;">
      地牢地图 (Tab关闭) · 已探索 ${gameState.visitedRooms.size}/${gameState.boards.length}
    </div>
    <div class="map-container" id="map-container"></div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) { toggleMap(); }
  });
  setTimeout(() => {
    const container = document.getElementById('map-container');
    if (!container) return;
    drawMap(container);
  }, 50);
}

function drawMap(container) {
  const gridPos = gameState.gridPos;
  if (!gridPos || gridPos.length === 0) return;
  const rect = container.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i < gridPos.length; i++) {
    minX = Math.min(minX, gridPos[i].x);
    minY = Math.min(minY, gridPos[i].y);
    maxX = Math.max(maxX, gridPos[i].x);
    maxY = Math.max(maxY, gridPos[i].y);
  }
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const cellSize = Math.min((w - 40) / cols, (h - 40) / rows, 64);
  const offsetX = (w - cols * cellSize) / 2;
  const offsetY = (h - rows * cellSize) / 2;

  const typeColors = {
    spawn: 'hsl(75,40%,88%)',
    yellow: 'hsl(50,80%,55%)',
    blue: 'hsl(210,70%,55%)',
    green: 'hsl(140,60%,48%)',
    orange: 'hsl(25,80%,55%)',
    purple: 'hsl(280,60%,55%)',
    king: 'hsl(0,70%,48%)',
  };

  const gridMap = {};
  for (let i = 0; i < gridPos.length; i++) {
    gridMap[`${gridPos[i].x},${gridPos[i].y}`] = i;
  }

  for (let gy = minY; gy <= maxY; gy++) {
    for (let gx = minX; gx <= maxX; gx++) {
      const key = `${gx},${gy}`;
      const boardIdx = gridMap[key];
      const left = offsetX + (gx - minX) * cellSize;
      const top = offsetY + (gy - minY) * cellSize;

      if (boardIdx !== undefined && gameState.visitedRooms.has(boardIdx)) {
        const board = gameState.boards[boardIdx];
        const isCurrent = boardIdx === gameState.currentBoardIndex;
        const isKing = board.type === 'king';
        const isSpawn = board.type === 'spawn';

        let dotColor = typeColors[board.type] || 'hsl(75,40%,88%)';
        let dotClass = 'map-dot';
        if (board.item && board.item.collected) {
          dotColor = 'hsl(0,0%,40%)';
          dotClass = 'map-dot map-dot-dim';
        }
        if (isKing) {
          const kingAlive = board.enemies.some(e => e.type === 'king' && e.alive !== false);
          if (!kingAlive) {
            dotColor = 'hsl(0,0%,40%)';
            dotClass = 'map-dot map-dot-dim';
          }
        }

        const cell = document.createElement('div');
        cell.className = 'map-cell' + (isCurrent ? ' map-current' : '');
        cell.style.left = left + 'px';
        cell.style.top = top + 'px';
        cell.style.width = (cellSize - 6) + 'px';
        cell.style.height = (cellSize - 6) + 'px';

        let inner = `<span class="${dotClass}" style="background:${dotColor};"></span>`;
        if (isKing) inner += `<span class="map-crown">♚</span>`;
        if (isSpawn) inner = `<span class="map-spawn">♙</span>`;

        cell.innerHTML = inner;
        cell.title = `${BOARD_LABELS[board.type]}`;
        container.appendChild(cell);
      }
    }
  }
}

function renderAbilitiesOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'dynamic-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:85;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px;';
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) toggleAbilities();
  });

  const ab = gameState.player.abilities;
  const items = [
    { name: '黄色能力', key: 'yellow', desc: '纵横向移动最大格数+1', value: `当前: ${1 + ab.yellow} 格 (已收集 ${ab.yellow}/4)`, color: 'hsl(50,80%,55%)' },
    { name: '蓝色能力', key: 'blue', desc: '斜向移动最大格数+1', value: `当前: ${ab.green ? (1 + ab.blue) : 0} 格 (已收集 ${ab.blue}/4，需绿色解锁)`, color: 'hsl(210,70%,55%)' },
    { name: '绿色能力', key: 'green', desc: '解锁斜向移动', value: ab.green ? '已解锁 ✓' : '未解锁', color: 'hsl(140,60%,48%)' },
    { name: '橙色能力', key: 'orange', desc: '可跳过1个阻挡棋子', value: ab.orange ? '已解锁 ✓' : '未解锁', color: 'hsl(25,80%,55%)' },
    { name: '紫色能力', key: 'purple', desc: '回合结束时随机吃掉左右相邻格内2回合内到达的敌子', value: ab.purple ? '已解锁 ✓' : '未解锁', color: 'hsl(280,60%,55%)' },
  ];

  const nextAbility = 3 - (gameState.abilityCount % 3);

  overlay.innerHTML = `
    <div class="ability-panel">
      <div style="font-size:10px;color:var(--color-accent);margin-bottom:8px;text-align:center;">已解锁能力 (Ctrl关闭)</div>
      <div style="font-size:8px;color:var(--color-text-muted);text-align:center;margin-bottom:10px;">
        已获得 ${gameState.abilityCount} 个能力 · 再获得 ${nextAbility === 3 ? '0' : nextAbility} 个触发房间增强
      </div>
      ${items.map(item => `
        <div style="margin-bottom:6px;display:flex;align-items:center;gap:8px;">
          <span style="width:10px;height:10px;border-radius:50%;background:${item.color};flex-shrink:0;"></span>
          <div class="min-w-0 flex-1">
            <div style="color:${item.color};">${item.name}</div>
            <div style="font-size:7px;color:var(--color-text-muted);">${item.desc}</div>
            <div style="font-size:7px;color:var(--color-text);">${item.value}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.body.appendChild(overlay);
}

function renderPauseOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay dynamic-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2>暂停</h2>
      <div style="margin: 12px 0;">
        <p style="font-size: 9px; margin-bottom: 4px; color: var(--color-text);">棋子字号：<span class="settings-value" id="size-display-pause">${pieceFontSize}px</span></p>
        <input type="range" min="16" max="64" value="${pieceFontSize}" class="settings-slider" id="size-slider-pause" />
        <div style="display: flex; justify-content: space-between; font-size: 7px; color: var(--color-text-muted);">
          <span>小</span>
          <span>大</span>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <button class="btn primary" onclick="resumeGame()" style="width:100%;">继续游戏</button>
        <button class="btn" onclick="restartGame()" style="width:100%;">重新开始</button>
        <button class="btn danger" onclick="quitToMenu()" style="width:100%;">退出游戏</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const slider = document.getElementById('size-slider-pause');
  const display = document.getElementById('size-display-pause');
  if (slider) {
    slider.addEventListener('input', () => {
      const val = parseInt(slider.value, 10);
      display.textContent = val + 'px';
      savePieceFontSize(val, false);
    });
  }
}

function resumeGame() {
  gameState.phase = gameState.isTutorial ? 'tutorial_playing' : 'playing';
  pauseVisible = false;
  document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
  render();
}

function quitToMenu() {
  gameState.phase = 'menu';
  gameState.isTutorial = false;
  pauseVisible = false;
  gameState.shopItems = { lottery: 0, super_lottery: 0, death_immunity: 0, invincible: 0 };
  gameState.deathImmunityUsed = false;
  clearShopItems();
  document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
  loadStats();
  render();
}

// ============================================================
// 教学模式弹窗
// ============================================================

function showTutorialPromptModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay dynamic-overlay';
  overlay.id = 'tutorial-prompt-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2>📖 ${TUTORIAL_LEVELS[gameState.tutorialLevel].name}</h2>
      <p style="font-size: 10px; line-height: 1.8; text-align: center; color: var(--color-text);">
        ${gameState.tutorialPromptText}
      </p>
      <div style="text-align:center; margin-top: 16px;">
        <button class="btn primary" id="btn-tutorial-start">确定</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn-tutorial-start').addEventListener('click', () => {
    overlay.remove();
    gameState.showTutorialPrompt = false;
    gameState.reachableCells = getPlayerMoves(gameState);
    render();
  });
}

function showTutorialCompleteModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay dynamic-overlay';
  overlay.id = 'tutorial-complete-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h2>🎉 恭喜过关！</h2>
      <p style="font-size: 10px; line-height: 1.8; text-align: center; color: var(--color-text);">
        ${gameState.tutorialCompleteText}
      </p>
      <div style="text-align:center; margin-top: 16px;">
        <button class="btn primary" id="btn-tutorial-next">确定</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn-tutorial-next').addEventListener('click', () => {
    overlay.remove();
    gameState.showTutorialComplete = false;
    gameState.reachableCells = getPlayerMoves(gameState);
    render();
  });
}

// ============================================================
// EVENT BINDING
// ============================================================

function bindEvents() {
  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      if ((gameState.phase !== 'playing' && gameState.phase !== 'tutorial_playing') || gameState.turn !== 'player') return;
      if (gameState.showTutorialPrompt || gameState.showTutorialComplete) return;
      const row = parseInt(cell.dataset.row);
      const col = parseInt(cell.dataset.col);
      movePlayer(row, col);
    });
  });

  const btnMap = document.getElementById('btn-map');
  const btnAbilities = document.getElementById('btn-abilities');
  const btnMenu = document.getElementById('btn-menu');
  if (btnMap) btnMap.addEventListener('click', toggleMap);
  if (btnAbilities) btnAbilities.addEventListener('click', toggleAbilities);
  if (btnMenu) btnMenu.addEventListener('click', togglePause);

  if (gameState.showTutorialPrompt && gameState.isTutorial && !document.getElementById('tutorial-prompt-overlay')) {
    showTutorialPromptModal();
  }
  if (gameState.showTutorialComplete && gameState.isTutorial && !document.getElementById('tutorial-complete-overlay')) {
    showTutorialCompleteModal();
  }
}

// ============================================================
// 键盘监听
// ============================================================

document.addEventListener('keydown', (e) => {
  if (gameState.phase === 'menu') {
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    if ((gameState.phase === 'playing' || gameState.phase === 'tutorial_playing' || gameState.phase === 'paused') && !gameState.isTutorial) {
      if (pauseVisible) { pauseVisible = false; document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove()); }
      toggleMap();
    }
    return;
  }

  if (e.key === 'Control') {
    e.preventDefault();
    if (gameState.phase === 'playing' || gameState.phase === 'tutorial_playing' || gameState.phase === 'paused') {
      if (mapVisible) { mapVisible = false; document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove()); }
      toggleAbilities();
    }
    return;
  }

  if (e.key === 'Escape') {
    e.preventDefault();
    if (gameState.phase === 'playing' || gameState.phase === 'tutorial_playing' || gameState.phase === 'paused') {
      if (mapVisible || abilitiesVisible) {
        mapVisible = false;
        abilitiesVisible = false;
        document.querySelectorAll('.dynamic-overlay').forEach(el => el.remove());
        if (gameState.phase === 'paused') gameState.phase = gameState.isTutorial ? 'tutorial_playing' : 'playing';
        render();
        return;
      }
      togglePause();
    }
    return;
  }
});

function showToast(msg, color) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.cssText = `border-color: ${color || 'var(--color-accent)'};`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// ============================================================
// INIT
// ============================================================

const savedSkin = loadSkin();
applySkin(savedSkin);

loadStats();
loadPieceFontSize();
render();
</script>
